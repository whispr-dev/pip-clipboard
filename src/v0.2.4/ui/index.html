<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>pip-clip-osd</title>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data:;">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ─── Ambient HUD: brief notification on clipboard change ─── -->
  <div id="ambient" class="ambient hidden" aria-live="polite">
    <div class="ambient-icon">📋</div>
    <div id="ambient-content" class="ambient-content"></div>
    <div class="ambient-badge" id="ambient-badge"></div>
  </div>

  <!-- ─── Safe-paste preview overlay ─── -->
  <div id="preview" class="preview hidden">
    <div class="preview-header">
      <span class="preview-title">Clipboard preview</span>
      <span class="preview-badge" id="preview-badge"></span>
      <button id="btn-close" class="preview-close" title="Cancel (Esc)">✕</button>
    </div>
    <div id="preview-content" class="preview-content"></div>
    <div class="preview-footer">
      <span class="preview-hint">
        <kbd>Enter</kbd> or <kbd>Ctrl+V</kbd> to paste &nbsp;·&nbsp;
        <kbd>Esc</kbd> to cancel
      </span>
      <div class="preview-actions">
        <button id="btn-cancel" class="btn btn-cancel">Cancel</button>
        <button id="btn-paste" class="btn btn-paste">Paste</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
