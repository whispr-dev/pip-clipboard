[package]
name = "pip-clip-osd"
version = "0.1.0"
edition = "2021"

[dependencies]
tauri = { version = "1.5", features = ["system-tray", "global-shortcut"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
arboard = "3.3"
enigo = "0.1.3"
image = { version = "0.24", default-features = false, features = ["png", "jpeg"] }
base64 = "0.22"
once_cell = "1.19"
parking_lot = "0.12"
anyhow = "1.0"
thiserror = "1.0"

[build-dependencies]
tauri-build = "1.5"
